<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" role="img" aria-labelledby="title desc">
  <title id="title">Clean school-year panel measures by year</title>
  <desc id="desc">Bars show grant recipients and meal-program leads by year. The line shows total grant amount.</desc>
  <style>
    text { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18212b; }
    .title { font-size: 24px; font-weight: 800; }
    .subtitle { font-size: 14px; fill: #65717d; }
    .axis { stroke: #c6c9c1; stroke-width: 1; }
    .grid { stroke: #deddd5; stroke-width: 1; opacity: 0.8; }
    .recipient { fill: #245f75; }
    .lead { fill: #7e3140; opacity: 0.86; }
    .amount-line { fill: none; stroke: #b9802e; stroke-width: 3; }
    .amount-dot { fill: #b9802e; }
    .year, .legend { font-size: 13px; font-weight: 800; }
  </style>
  <rect width="820" height="360" rx="8" fill="#ffffff"/>
  <text x="32" y="40" class="title">The cleaned panel has year-by-year structure</text>
  <text x="32" y="65" class="subtitle">Every school appears in every year, so zeroes and cumulative meal-program leadership are visible.</text>
  <line x1="50" y1="286" x2="730" y2="286" class="axis"/>
  <line x1="50" y1="118" x2="730" y2="118" class="grid"/>
  <polyline points="113,245 217,221 321,214 425,124 529,118 633,223" class="amount-line"/>
  <rect x="68" y="262" width="20" height="24" rx="3" class="recipient"/><rect x="94" y="262" width="20" height="24" rx="3" class="lead"/><circle cx="113" cy="245" r="4" class="amount-dot"/><text x="88" y="311" class="year">2019</text><rect x="172" y="246" width="20" height="40" rx="3" class="recipient"/><rect x="198" y="230" width="20" height="56" rx="3" class="lead"/><circle cx="217" cy="221" r="4" class="amount-dot"/><text x="192" y="311" class="year">2020</text><rect x="276" y="238" width="20" height="48" rx="3" class="recipient"/><rect x="302" y="190" width="20" height="96" rx="3" class="lead"/><circle cx="321" cy="214" r="4" class="amount-dot"/><text x="296" y="311" class="year">2021</text><rect x="380" y="210" width="20" height="76" rx="3" class="recipient"/><rect x="406" y="134" width="20" height="152" rx="3" class="lead"/><circle cx="425" cy="124" r="4" class="amount-dot"/><text x="400" y="311" class="year">2022</text><rect x="484" y="210" width="20" height="76" rx="3" class="recipient"/><rect x="510" y="118" width="20" height="168" rx="3" class="lead"/><circle cx="529" cy="118" r="4" class="amount-dot"/><text x="504" y="311" class="year">2023</text><rect x="588" y="258" width="20" height="28" rx="3" class="recipient"/><rect x="614" y="118" width="20" height="168" rx="3" class="lead"/><circle cx="633" cy="223" r="4" class="amount-dot"/><text x="608" y="311" class="year">2024</text>
  <rect x="535" y="98" width="13" height="13" class="recipient"/><text x="555" y="110" class="legend">Grant recipients</text>
  <rect x="535" y="121" width="13" height="13" class="lead"/><text x="555" y="133" class="legend">Meal-program leads</text>
  <circle cx="541" cy="150" r="5" class="amount-dot"/><text x="555" y="154" class="legend">Grant amount</text>
</svg>
