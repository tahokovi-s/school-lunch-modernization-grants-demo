<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 454" role="img" aria-labelledby="title desc">
  <title id="title">Raw cafeteria partner role labels</title>
  <desc id="desc">A horizontal bar chart showing the most common raw cafeteria partner role labels before classification.</desc>
  <style>
    text { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18212b; }
    .title { font-size: 24px; font-weight: 800; }
    .subtitle { font-size: 14px; fill: #65717d; }
    .label { font-size: 13px; font-weight: 700; }
    .count { font-size: 13px; font-weight: 800; fill: #245f75; }
    .bar { fill: #b9802e; opacity: 0.78; }
    .rule { stroke: #deddd5; stroke-width: 1; }
  </style>
  <rect width="820" height="454" rx="8" fill="#ffffff"/>
  <text x="32" y="40" class="title">Raw role labels are messy</text>
  <text x="32" y="65" class="subtitle">The same file mixes school leads, district offices, vendors, advisors, education partners, and ambiguous helpers.</text>
  <line x1="32" y1="82" x2="788" y2="82" class="rule"/>
  <text class="label"><tspan x="32" y="110">school meal program lead</tspan></text><rect x="250" y="99" width="500" height="18" rx="3" class="bar"/><text x="760" y="111" class="count">42</text><text class="label"><tspan x="32" y="146">district sponsor</tspan></text><rect x="250" y="135" width="309" height="18" rx="3" class="bar"/><text x="569" y="147" class="count">26</text><text class="label"><tspan x="32" y="182">district nutrition office</tspan></text><rect x="250" y="171" width="261" height="18" rx="3" class="bar"/><text x="521" y="183" class="count">22</text><text class="label"><tspan x="32" y="218">nutrition education partner</tspan></text><rect x="250" y="207" width="190" height="18" rx="3" class="bar"/><text x="450" y="219" class="count">16</text><text class="label"><tspan x="32" y="254">kitchen equipment vendor</tspan></text><rect x="250" y="243" width="154" height="18" rx="3" class="bar"/><text x="414" y="255" class="count">13</text><text class="label"><tspan x="32" y="290">unclear role</tspan></text><rect x="250" y="279" width="142" height="18" rx="3" class="bar"/><text x="402" y="291" class="count">12</text><text class="label"><tspan x="32" y="326">grant compliance advisor</tspan></text><rect x="250" y="315" width="130" height="18" rx="3" class="bar"/><text x="390" y="327" class="count">11</text><text class="label"><tspan x="32" y="362">kitchen installer</tspan></text><rect x="250" y="351" width="130" height="18" rx="3" class="bar"/><text x="390" y="363" class="count">11</text><text class="label"><tspan x="32" y="398">dishwasher vendor</tspan></text><rect x="250" y="387" width="130" height="18" rx="3" class="bar"/><text x="390" y="399" class="count">11</text>
</svg>
