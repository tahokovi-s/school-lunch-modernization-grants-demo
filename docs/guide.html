<!doctype html>
<html lang="en">
  <head>

    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">STAX Lab teaching demo</p>
        <h1>STAX Coding Agent Training</h1>
      </div>
      <div class="slate" aria-hidden="true">
        <div class="slate-stripes">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="slate-body">
          <span>Scene 00</span>

        <code>codex --version</code>
